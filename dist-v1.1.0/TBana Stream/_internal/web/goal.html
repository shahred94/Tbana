<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>TBana Stream Goal Overlay</title>

    <link rel="stylesheet" href="style.css?v=1.0.10-goal-overlay">
</head>

<body class="goal-only-overlay">

    <div id="goal-widget" class="goal-widget">
        <div class="goal-bar">
            <div id="goal-progress" class="goal-progress"></div>
            <div class="goal-shine"></div>
        </div>

        <div class="goal-copy">
            <span id="goal-title">Random Traffic</span>
            <span>-</span>
            <span id="goal-count">0 / 6,000</span>
            <span id="goal-label">Likes</span>
        </div>
    </div>

    <script src="app.js?v=1.0.10-goal-overlay"></script>

</body>

</html>
