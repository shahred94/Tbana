<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>LiveTrigger Overlay</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="alert" class="hidden">

        <div class="gift">
            🌹
        </div>

        <div class="text">
            <h2 id="gift-name">
                Rose x1
            </h2>

            <p id="user">
                BANA Plus
            </p>
        </div>

    </div>

    <div id="spin-widget" class="spin-widget hidden">

        <div class="spin-card">

            <div class="spin-header">
                <span id="spin-user">Viewer</span>
                <strong>!spin</strong>
            </div>

            <div class="spin-stage">
                <div class="spin-pointer"></div>
                <div id="spin-wheel" class="spin-wheel">
                    <span>SPIN</span>
                </div>
            </div>

            <div class="spin-result">
                <span>Result</span>
                <strong id="spin-result">...</strong>
            </div>

        </div>

    </div>


    <script src="app.js"></script>

</body>

</html>
