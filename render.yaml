databases:
  - name: tbanastream-db-free
    plan: free
    databaseName: tbanastream
    user: tbanastream
    region: singapore

services:
  - type: web
    name: tbanastream-api
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements-production.txt
    startCommand: uvicorn app.production_main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: DATABASE_URL
        fromDatabase:
          name: tbanastream-db-free
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PUBLIC_BASE_URL
        value: https://tbanastream-api.onrender.com
      - key: TRUSTED_HOSTS
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: TOYYIBPAY_BASE_URL
        value: https://toyyibpay.com
      - key: TOYYIBPAY_CATEGORY_CODE
        sync: false
      - key: TOYYIBPAY_SECRET_KEY
        sync: false
